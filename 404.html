<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — AuvaLabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#050505;color:#555;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center}
.box{max-width:400px;padding:24px}
h1{font-size:3rem;font-weight:300;color:#333;margin-bottom:8px;letter-spacing:-0.03em}
p{font-size:0.78rem;font-weight:300;line-height:1.6;margin-bottom:16px;letter-spacing:0.03em}
a{color:#00ff88;text-decoration:none;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;opacity:0.6;transition:opacity 0.2s}
a:hover{opacity:1}
</style>
<script>
(function() {
  var defined = { '/threatwatch/': true };
  var path = location.pathname;
  var lower = path.toLowerCase().replace(/\/$/, '') + '/';
  if (lower !== path && defined[lower]) {
    location.replace(location.origin + lower + location.search + location.hash);
  }
})();
</script>
</head>
<body>
<div class="box">
  <h1>404</h1>
  <p>Nothing here.</p>
  <a href="/">back to systems</a>
</div>
</body>
</html>
